apiVersion: v1
kind: Pod
metadata:
  name: meu-pod-limitado
  labels:
    run: meu-pod-limitado
spec:
  containers:
    - image: ubuntu
      name: ubuntu
      args:
        - sleep
        - "2000"
      resources:
        limits:
          cpu: "0.5"
          memory: "128Mi"
        requests:
          cpu: "0.3"
          memory: "64Mi"

  dnsPolicy: ClusterFirst
  restartPolicy: Always
