apiVersion: v1
kind: Pod
metadata:
  name: meu-pod-volume
  labels:
    run: meu-pod-volume
spec:
  containers:
    - image: nginx
      name: web-server
      volumeMounts:
        - mountPath: /cunha
          name: primeiro-empty-dir
      resources:
        limits:
          cpu: "1"
          memory: "128Mi"
        requests:
          cpu: "0.5"
          memory: "64Mi"
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  volumes:
    - name: primeiro-empty-dir
      emptyDir:
        sizeLimit: "256Mi"
